name: Release Chatobby plugin

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out tagged source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci --ignore-scripts

      - name: Verify release version
        run: |
          node -e "const fs=require('node:fs'); const packageVersion=JSON.parse(fs.readFileSync('package.json','utf8')).version; const manifestVersion=JSON.parse(fs.readFileSync('manifest.json','utf8')).version; if (packageVersion !== process.env.GITHUB_REF_NAME || manifestVersion !== process.env.GITHUB_REF_NAME) { throw new Error('Tag, package, and manifest versions must match'); }"

      - name: Check source and architecture
        run: npm run check

      - name: Run tests
        run: npm test

      - name: Build verified release assets
        env:
          CHATOBBY_RUNTIME_PUBLIC_KEY: ${{ vars.CHATOBBY_RUNTIME_PUBLIC_KEY }}
        run: npm run build:release

      - name: Attest release assets
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-path: release/*

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          notes_file="RELEASE_NOTES_${GITHUB_REF_NAME}.md"
          test -f "$notes_file"
          gh release create "$GITHUB_REF_NAME" \
            release/main.js \
            release/manifest.json \
            release/styles.css \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --title "Chatobby ${GITHUB_REF_NAME}" \
            --notes-file "$notes_file"
